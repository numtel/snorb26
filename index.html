<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>dencity</title>
  <link rel="stylesheet" href="memphis.css">
  <link rel="stylesheet" href="style.css">
</head>
<body tabindex="-1">
  <canvas id="scene"></canvas>
  <div id="hud"></div>
  <div id="tools" class="toolbar menubar">
    <div class="vr"></div>
    <div class="menu-container">
      <button class="menu-trigger">File</button>
      <dialog class="menu">
        <button data-command="reset">New Map</button>
        <label class="ctl">Width <input id="newWidth" type="text" value="256"></label>
        <label class="ctl">Height <input id="newHeight" type="text" value="256"></label>
        <div class="hr"></div>
        <button data-command="open-file">Open file...</button>
        <button data-command="save-file">Save file</button>
      </dialog>
    </div>
    <div class="menu-container">
      <button class="menu-trigger">Map</button>
      <dialog class="menu">
        <label class="ctl">
          Water Level
          <input id="waterLevel" type="range" min="1" max="255" step="1" value="86">
        </label>
      </dialog>
    </div>
    <div class="menu-container">
      <button class="menu-trigger">Tool</button>
      <dialog class="menu">
        <button data-tool="pan" class="active" data-key="1">Pan</button>
        <button data-tool="orbit" data-key="2">Orbit</button>
        <div class="hr"></div>
        <button data-tool="raise" data-key="3">Raise</button>
        <button data-tool="lower" data-key="4">Lower</button>
        <button data-tool="smooth" data-key="5">Smooth</button>
        <button data-tool="forest" data-key="9">Forest</button>
        <button data-tool="demolish" data-key="0">Demolish</button>
        <label class="ctl">Size <input id="brushSize" type="range" min="1" max="8" step="1" value="2"></label>
        <label class="ctl">Smooth <input id="brushSmooth" type="range" min="0" max="1" step="0.05" value="0.25"></label>
        <div class="hr"></div>
        <button data-tool="level" data-key="6">Level</button>
        <div class="hr"></div>
        <button data-tool="build" data-key="7">Build</button>
        <div class="hr"></div>
        <button data-tool="custom-build" data-key="8">Custom Build</button>
        <label class="ctl">URL <input id="customUrl" type="text" placeholder="https://..." value="assets/tree1.png,assets/tree2.png,assets/tree3.png"></label>
        <div class="hr"></div>
        <button data-tool="extrude" data-key="M">Extrude Path</button>
        <button data-tool="edit-path" data-key="N">Edit Path</button>
        <label class="ctl">Width <input id="exWidth" type="range" min="0.1" max="2" step="0.1" value="0.5"></label>
        <label class="ctl">Height <input id="exHeight" type="range" min="0" max="10" step="0.5" value="2.0"></label>
        <label class="ctl">Color <input id="exColor" type="color" value="#808080"></label>
      </dialog>
    </div>
    <div class="menu-container">
      <button class="menu-trigger">View</button>
      <dialog class="menu">
        <button data-command="pan-up" data-key="W">Pan Up</button>
        <button data-command="pan-down" data-key="S">Pan Down</button>
        <button data-command="pan-left" data-key="A">Pan Left</button>
        <button data-command="pan-right" data-key="D">Pan Right</button>
        <button data-command="center-view" data-key="C">Center Map</button>
        <button data-command="center-selection" data-key="V">Center Selected</button>
        <div class="hr"></div>
        <button data-command="zoom-in" data-key="Z">Zoom In</button>
        <button data-command="zoom-out" data-key="X">Zoom Out</button>
        <div class="hr"></div>
        <button data-command="rotate-left" data-key="Q">Rotate Left</button>
        <button data-command="rotate-right" data-key="E">Rotate Right</button>
        <div class="hr"></div>
        <button data-command="tilt-up" data-key="R">Tilt Up</button>
        <button data-command="tilt-down" data-key="F">Tilt Down</button>
        <div class="hr"></div>
        <button data-command="toggle-grid" data-key="G">Show Grid</button>
      </dialog>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
