<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>dencity</title>
  <link rel="stylesheet" href="style.css">
</head>
<body tabindex="-1">
  <canvas id="scene"></canvas>
  <div id="hud"></div>
  <div id="tools">
    <button data-tool="pan" class="active">Pan</button>
    <div class="sep"></div>
    <button data-tool="raise">Raise</button>
    <button data-tool="lower">Lower</button>
    <button data-tool="level">Level</button>
    <button data-tool="build">Build</button>
    <div class="sep"></div>
    <label class="ctl">Size <input id="brushSize" type="range" min="1" max="8" step="1" value="2"></label>
    <button data-command="reset">Reset</button>
    <label class="ctl">Smooth <input id="brushSmooth" type="range" min="0" max="1" step="0.05" value="0.25"></label>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
